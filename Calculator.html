<!DOCTYPE html>
<html>
    <head> <title>Calculator</title>
        <style>
            body{
    font-family: Arial;
    background-color: rgb(0, 0, 0);            }
            .JS-GreyButton
            {
                    background-color: rgb(51, 51, 51);
    color: white;
        height: 60px;
    width: 60px;
    border-radius: 60px;
    border: none;
    font-size: 26px;
    cursor: pointer;
    margin-right: 5px;
            }
             .JS-orangeButton{
                      background-color: rgb(254, 160, 10);
    color: white;
        height: 60px;
    width: 60px;
    border-radius: 60px;
    border: none;
    font-size: 26px;
    cursor: pointer;
    margin-right: 5px;
            }
            .Js-Clear
            {
                   font-size: 17px; 
            }
            .Result
            {
                color: white;
    font-size: 45px;
    margin-top: 15px;
    margin-bottom: 5px;

            }
        </style>
    </head>

    <body>
        <p  class="Result"> </p>
    <p>
        <button onclick="updateCalculation('1')" class="JS-GreyButton">1</button>
        <button onclick="updateCalculation('2')" class="JS-GreyButton">2</button>
        <button onclick="updateCalculation('3')" class="JS-GreyButton">3</button>
        <button onclick="updateCalculation('+')" class="JS-orangeButton">+</button>

    </p>
      <p>
        <button onclick="updateCalculation('4')" class="JS-GreyButton">4</button>
        <button onclick="updateCalculation('5')" class="JS-GreyButton">5</button>
        <button onclick="updateCalculation('6')" class="JS-GreyButton">6</button>
        <button onclick="updateCalculation('-')" class="JS-orangeButton">-</button>

    </p>
     <p>
        <button onclick="updateCalculation('7')" class="JS-GreyButton">7</button>
        <button onclick="updateCalculation('8')" class="JS-GreyButton">8</button>
        <button onclick="updateCalculation('9')" class="JS-GreyButton">9</button>
        <button onclick="updateCalculation('*')" class="JS-orangeButton">x</button>

    </p>
    <p>
        <button onclick="updateCalculation('0')" class="JS-GreyButton">0</button>
        <button onclick="updateCalculation('.')" class="JS-GreyButton">.</button>
        <button onclick="
        cal=eval(cal);
        displaycalulation();
                     localStorage.setItem('Totalcalculation',cal)
" class="JS-GreyButton">=</button>
        <button onclick="updateCalculation('/')" class="JS-orangeButton">/</button>
    </p>
    <button onclick="cal='';
     displaycalulation();
             localStorage.setItem('Totalcalculation',cal)

     " class="Js-Clear">Clear</button>

    </body>

    <script>
let cal;
cal=localStorage.getItem('Totalcalculation') || '';
displaycalulation();
    function updateCalculation(Value)
    {
        cal +=Value;
        displaycalulation();
        localStorage.setItem('Totalcalculation',cal)
    }

    function displaycalulation ()
    {
        document.querySelector('.Result').innerHTML=cal;
    }

    </script>
</html>
