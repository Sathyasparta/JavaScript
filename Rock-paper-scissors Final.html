<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
   <link rel="stylesheet" href="CSS/RockpaperscissorsStyles.css">
  </head>
  <body>
    <p class="Title">Rock Paper Scissors</p>
    <button onclick="
      playGame('rock')"
class="Move-Button"><img src="/images/rock-emoji.png" class="Move-icon"></button>

    <button onclick="
      playGame('paper');
    "class="Move-Button"><img src="/images/paper-emoji.png" class="Move-icon" ></button>

    <button onclick="
      playGame('scissors');
    "class="Move-Button"><img src="/images/scissors-emoji.png" class="Move-icon"></button>

  <p class="JS-Result Result"></p>
  <p class="JS-Moves"></p>
  <p class="JS-Score"></p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      UpdateScore();
    " class="Reset">Reset Score</button>

    <script src="/script/rock-paper-scissors.js">
    </script>
  </body>
</html>
