removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']);

function removeEgg(foods) {
  let i = foods.length - 1;
  for (i; i >= 0; i--) {
    if (foods[i]==='egg') {
      foods.splice(i, 1);
    }
  }
  return foods; // now outside the loop, runs once after all iterations
}

console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
